<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudia Brain Viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes cursorPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #12141a;
  color: #d8dce6;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

.app { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 196px;
  min-width: 196px;
  background: #181b23;
  border-right: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar-header h1 {
  font-size: 15px;
  font-weight: 700;
  color: #f0f2f8;
  text-transform: uppercase;
  letter-spacing: 2.5px;
}
.sidebar-header .subtitle {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: rgba(255,255,255,0.5);
  margin-top: 4px;
}

.cycles-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
}
.cycles-list::-webkit-scrollbar { width: 4px; }
.cycles-list::-webkit-scrollbar-track { background: transparent; }
.cycles-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.date-group { margin-bottom: 8px; }
.date-group-header {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 8px 8px 4px;
}

.cycle-item {
  padding: 10px 12px;
  cursor: pointer;
  border-radius: 8px;
  margin-bottom: 2px;
  transition: all 0.15s ease;
  border: 1px solid transparent;
}
.cycle-item:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.06);
}
.cycle-item.active {
  background: rgba(100,160,255,0.12);
  border-color: rgba(100,160,255,0.2);
  border-left: 3px solid #5b9fff;
  padding-left: 9px;
}

.cycle-name {
  font-size: 13px;
  font-weight: 500;
  color: #e4e8f0;
  line-height: 1.3;
}
.cycle-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.cycle-events {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: rgba(255,255,255,0.4);
}
.cycle-bar {
  display: flex;
  height: 3px;
  border-radius: 2px;
  overflow: hidden;
  flex: 1;
}

.cycles-empty {
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  padding: 16px 8px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Legend ── */
.legend {
  padding: 12px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.legend h3 {
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.legend-items {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Stats ── */
.stats {
  padding: 12px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.stats .stat {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin: 4px 0;
  display: flex;
  justify-content: space-between;
}
.stats .stat span {
  color: #e4e8f0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
}

/* ── Drop zone ── */
.drop-label {
  padding: 10px 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.drop-label label {
  display: block;
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  text-align: center;
  padding: 10px;
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.drop-label label:hover {
  border-color: rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.02);
}
.drop-label input { display: none; }

/* ── Main canvas ── */
.main { flex: 1; position: relative; overflow: hidden; background: #12141a; }
.main svg { width: 100%; height: 100%; }

/* ── Controls ── */
.controls {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  align-items: center;
  background: rgba(24,27,35,0.92);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 8px 14px;
  z-index: 10;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.controls button {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #d0d4de;
  padding: 5px 12px;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s ease;
}
.controls button:hover {
  background: rgba(255,255,255,0.12);
  color: #f0f2f8;
}
.controls button.active {
  background: rgba(100,160,255,0.15);
  border-color: rgba(100,160,255,0.3);
  color: #a0c4ff;
}
.controls .speed-label {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-left: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.controls .divider {
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,0.1);
  margin: 0 6px;
}

/* ── Empty state ── */
.empty-state {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: rgba(255,255,255,0.35);
  pointer-events: none;
}
.empty-state .icon {
  font-size: 48px;
  margin-bottom: 14px;
  opacity: 0.5;
}
.empty-state p {
  font-size: 14px;
  letter-spacing: 1.5px;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Brain Viewer</h1>
      <div class="subtitle">claudia neural activity</div>
    </div>
    <div class="cycles-list" id="cycles-list">
      <div class="cycles-empty">loading...</div>
    </div>
    <div class="legend">
      <h3>Regions</h3>
      <div class="legend-items">
        <div class="legend-item"><div class="legend-dot" style="background:#7ab8ff"></div>memories</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6ee69a"></div>schedule</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ecd86e"></div>brain</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d4a6ff"></div>identity</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffb85c"></div>social</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6eeaea"></div>knowledge</div>
        <div class="legend-item"><div class="legend-dot" style="background:#b8beca"></div>tools</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff7e7e"></div>infra</div>
      </div>
    </div>
    <div class="stats" id="stats">
      <div class="stat">events <span id="stat-events">--</span></div>
      <div class="stat">duration <span id="stat-duration">--</span></div>
      <div class="stat">regions <span id="stat-regions">--</span></div>
      <div id="stat-types" style="margin-top: 8px;"></div>
    </div>
    <div class="drop-label">
      <label for="file-input">drop or click to load .jsonl</label>
      <input type="file" id="file-input" accept=".jsonl">
    </div>
  </div>

  <div class="main" id="main">
    <svg id="canvas"></svg>
    <div class="empty-state" id="empty-state">
      <div class="icon">&#x2B22;</div>
      <p>select a cycle to begin</p>
    </div>
    <div class="controls" id="controls" style="display:none">
      <button id="btn-play">&#9654; play</button>
      <button id="btn-pause" style="display:none">&#10074;&#10074; pause</button>
      <button id="btn-jump">&#x21E5; end</button>
      <div class="divider"></div>
      <span class="speed-label">speed</span>
      <button class="speed-btn" data-speed="0.5">0.5x</button>
      <button class="speed-btn active" data-speed="1">1x</button>
      <button class="speed-btn" data-speed="2">2x</button>
      <button class="speed-btn" data-speed="5">5x</button>
      <button class="speed-btn" data-speed="10">10x</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───
var REGION_COLORS = {
  memories: '#7ab8ff', schedule: '#6ee69a', brain: '#ecd86e',
  identity: '#d4a6ff', social: '#ffb85c',
  knowledge: '#6eeaea', tools: '#b8beca', infra: '#ff7e7e'
};

var BRAIN_TREE = {
  name: '.openclaw', children: [
    { name: 'memories', children: [{ name: 'entries' }] },
    { name: 'schedule', children: [{ name: 'initiatives' }, { name: 'cycles' }, { name: 'daily' }] },
    { name: 'brain', children: [{ name: 'working-set' }, { name: 'keyword-graph' }] },
    { name: 'identity', children: [{ name: 'personality' }] },
    { name: 'social', children: [{ name: 'twitter' }, { name: 'telegram' }] },
    { name: 'tools', children: [{ name: 'workshop' }, { name: 'email' }, { name: 'system' }] },
    { name: 'knowledge', children: [{ name: 'crypto' }, { name: 'ai' }, { name: 'protocols' }] },
    { name: 'infra', children: [{ name: 'hooks' }, { name: 'launchers' }] }
  ]
};

// ─── STATE ───
var events = [];
var playing = false;
var speed = 1;
var playIndex = 0;
var playTimer = null;
var treeNodeMap = {};
var treeLayout = null;
var dims = { w: 0, h: 0 };
var regionEventCounts = {};
var lastEventRegion = '';
var currentCycleId = '';

// Layout constants
var BAR_Y = 0.82;
var BAR_BOX_H = 34;
var BAR_PAD_LEFT = 50;
var TIMELINE_Y_OFFSET = 16;
var FOLDER_ACTION_ZONE = 220;
var FORK_H = 100;
var ACTION_NODE_H = 26;
var ACTION_NODE_GAP = 3;
var ACTION_START_GAP = 35;
var MAX_VISIBLE_ACTIONS = 5;

// Each column tracks a fixed array of slots (0 = closest to bar, MAX-1 = farthest).
// New nodes take slot 0; existing nodes shift up by one slot. When full, the
// topmost (oldest) is evicted. This is a visual FIFO: newest at bottom, oldest at top.
var columnStacks = {};
var belowStacks = { count: 0, nodes: [] };

// ─── SVG SETUP ───
var svg = d3.select('#canvas');
var defs = svg.append('defs');

// Filters — brighter glows
var glowFilter = defs.append('filter').attr('id', 'glow').attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
glowFilter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
glowFilter.append('feComposite').attr('in', 'SourceGraphic').attr('in2', 'blur').attr('operator', 'over');

var glowStrong = defs.append('filter').attr('id', 'glow-strong').attr('x', '-100%').attr('y', '-100%').attr('width', '300%').attr('height', '300%');
glowStrong.append('feGaussianBlur').attr('stdDeviation', '6').attr('result', 'blur');
var mergeSt = glowStrong.append('feMerge');
mergeSt.append('feMergeNode').attr('in', 'blur');
mergeSt.append('feMergeNode').attr('in', 'blur');
mergeSt.append('feMergeNode').attr('in', 'SourceGraphic');

var glowTimeline = defs.append('filter').attr('id', 'glow-timeline').attr('x', '-20%').attr('y', '-200%').attr('width', '140%').attr('height', '500%');
glowTimeline.append('feGaussianBlur').attr('stdDeviation', '6').attr('result', 'blur');
var mergeT = glowTimeline.append('feMerge');
mergeT.append('feMergeNode').attr('in', 'blur');
mergeT.append('feMergeNode').attr('in', 'SourceGraphic');

var glowPulse = defs.append('filter').attr('id', 'glow-pulse').attr('x', '-100%').attr('y', '-100%').attr('width', '300%').attr('height', '300%');
glowPulse.append('feGaussianBlur').attr('stdDeviation', '8').attr('result', 'blur');
var mergeP = glowPulse.append('feMerge');
mergeP.append('feMergeNode').attr('in', 'blur');
mergeP.append('feMergeNode').attr('in', 'blur');
mergeP.append('feMergeNode').attr('in', 'SourceGraphic');

// Region glow filters
Object.keys(REGION_COLORS).forEach(function(region) {
  var color = REGION_COLORS[region];
  var f = defs.append('filter').attr('id', 'glow-' + region).attr('x', '-80%').attr('y', '-80%').attr('width', '260%').attr('height', '260%');
  f.append('feGaussianBlur').attr('stdDeviation', '5').attr('result', 'blur');
  f.append('feFlood').attr('flood-color', color).attr('flood-opacity', '0.6').attr('result', 'color');
  f.append('feComposite').attr('in', 'color').attr('in2', 'blur').attr('operator', 'in').attr('result', 'colored-blur');
  var m = f.append('feMerge');
  m.append('feMergeNode').attr('in', 'colored-blur');
  m.append('feMergeNode').attr('in', 'SourceGraphic');
});

// Timeline gradient — brighter
var tlGrad = defs.append('linearGradient').attr('id', 'timeline-gradient').attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '0%');
tlGrad.append('stop').attr('offset', '0%').attr('stop-color', '#5b9fff').attr('stop-opacity', 0.0);
tlGrad.append('stop').attr('offset', '5%').attr('stop-color', '#5b9fff').attr('stop-opacity', 0.9);
tlGrad.append('stop').attr('offset', '50%').attr('stop-color', '#80bbff').attr('stop-opacity', 1.0);
tlGrad.append('stop').attr('offset', '95%').attr('stop-color', '#5b9fff').attr('stop-opacity', 0.9);
tlGrad.append('stop').attr('offset', '100%').attr('stop-color', '#5b9fff').attr('stop-opacity', 0.0);

// SVG layers
var gForks = svg.append('g').attr('class', 'forks');
var gForkNodes = svg.append('g').attr('class', 'fork-nodes');
var gBar = svg.append('g').attr('class', 'bar');
var gConnectors = svg.append('g').attr('class', 'connectors');
var gActions = svg.append('g').attr('class', 'actions');
var gCounters = svg.append('g').attr('class', 'counters');
var gFlowLines = svg.append('g').attr('class', 'flow-lines');

var gPannable = svg.append('g').attr('class', 'pannable');
var gTimeline = gPannable.append('g').attr('class', 'timeline');
var gBelow = gPannable.append('g').attr('class', 'below');
var gAnimations = gPannable.append('g').attr('class', 'animations');

var panTransform = d3.zoomIdentity;
var canvasW = 0;

// ─── BRAIN TREE LAYOUT ───
function buildTreeHierarchy() {
  return d3.hierarchy(BRAIN_TREE, function(d) { return d.children; });
}

var regionPositions = {};
var leafPositions = {};

function layoutBar() {
  var root = buildTreeHierarchy();
  var regions = root.children || [];
  var n = regions.length;
  var barY = dims.h * BAR_Y;
  var padLeft = BAR_PAD_LEFT;
  var padRight = 20;
  var totalW = dims.w - padLeft - padRight;
  var boxW = totalW / n;

  regionPositions = {};
  regions.forEach(function(r, i) {
    var cx = padLeft + boxW * i + boxW / 2;
    regionPositions[r.data.name] = { x: cx, y: barY, boxW: boxW };
  });

  leafPositions = {};
  treeNodeMap = {};

  var boxTopY = barY - BAR_BOX_H / 2;
  var forkBottomY = boxTopY - FOLDER_ACTION_ZONE;

  regions.forEach(function(r) {
    var rp = regionPositions[r.data.name];
    var children = r.children || [];
    var rPath = r.data.name;
    treeNodeMap[rPath] = { px: rp.x, py: rp.y, data: r.data, depth: 1 };

    if (children.length === 0) return;

    var childW = rp.boxW / (children.length + 1);
    var actionBand = MAX_VISIBLE_ACTIONS * (ACTION_NODE_H + ACTION_NODE_GAP);
    var bandGap = 12;

    var leafList = [];
    children.forEach(function(c, ci) {
      var cx = rp.x - rp.boxW / 2 + childW * (ci + 1);
      var t = children.length === 1 ? 0.5 : ci / (children.length - 1);
      var cy = forkBottomY - t * FORK_H;
      var path = r.data.name + '/' + c.data.name;
      leafList.push({ c: c, ci: ci, cx: cx, cy: cy, path: path });
    });

    var highestLeafY = Math.min.apply(null, leafList.map(function(l) { return l.cy; }));
    var bandStart = highestLeafY - ACTION_START_GAP;

    leafList.sort(function(a, b) { return b.cy - a.cy; });
    leafList.forEach(function(leaf, i) {
      leaf.actionStartY = bandStart - i * (actionBand + bandGap);
    });

    leafList.forEach(function(leaf) {
      leafPositions[leaf.path] = { x: leaf.cx, y: leaf.cy, actionStartY: leaf.actionStartY };
      treeNodeMap[leaf.path] = { px: leaf.cx, py: leaf.cy, actionStartY: leaf.actionStartY, data: leaf.c.data, depth: 2, regionName: r.data.name };

      if (leaf.c.children) {
        leaf.c.children.forEach(function(gc) {
          var gcPath = r.data.name + '/' + leaf.c.data.name + '/' + gc.data.name;
          treeNodeMap[gcPath] = { px: leaf.cx, py: leaf.cy, actionStartY: leaf.actionStartY, data: gc.data, depth: 3, regionName: r.data.name };
        });
      }
    });
  });

  treeLayout = root;
}

function renderBar() {
  gBar.selectAll('*').remove();
  gForks.selectAll('*').remove();
  gForkNodes.selectAll('*').remove();

  layoutBar();

  var barY = dims.h * BAR_Y;

  // Background bar
  gBar.append('rect')
    .attr('x', 0).attr('y', barY - BAR_BOX_H / 2 - 2)
    .attr('width', dims.w).attr('height', BAR_BOX_H + TIMELINE_Y_OFFSET + 10)
    .attr('fill', 'rgba(255,255,255,0.03)')
    .attr('stroke', 'none');

  // Folder boxes — brighter
  Object.keys(regionPositions).forEach(function(name) {
    var rp = regionPositions[name];
    var color = REGION_COLORS[name] || '#888';
    var boxW = rp.boxW - 10;

    gBar.append('rect')
      .attr('x', rp.x - boxW / 2).attr('y', barY - BAR_BOX_H / 2)
      .attr('width', boxW).attr('height', BAR_BOX_H)
      .attr('rx', 5).attr('ry', 5)
      .attr('fill', color)
      .attr('fill-opacity', 0.12)
      .attr('stroke', color)
      .attr('stroke-opacity', 0.5)
      .attr('stroke-width', 1.5)
      .attr('class', 'folder-box')
      .attr('data-region', name);

    gBar.append('text')
      .attr('x', rp.x).attr('y', barY + 1)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('fill', color)
      .attr('fill-opacity', 1)
      .attr('font-size', '13px')
      .attr('font-family', "'Inter', sans-serif")
      .attr('font-weight', '600')
      .attr('letter-spacing', '0.5px')
      .text(name);
  });

  // Fork branches
  var boxTopY = barY - BAR_BOX_H / 2;
  var forkBottomY = boxTopY - FOLDER_ACTION_ZONE;

  Object.keys(regionPositions).forEach(function(regionName) {
    var rp = regionPositions[regionName];
    var color = REGION_COLORS[regionName] || '#888';

    var regionLeaves = [];
    Object.keys(leafPositions).forEach(function(path) {
      if (path.split('/')[0] === regionName) {
        regionLeaves.push({ path: path, pos: leafPositions[path] });
      }
    });

    if (regionLeaves.length === 0) return;

    var leafXs = regionLeaves.map(function(l) { return l.pos.x; });
    var barLineY = forkBottomY;

    // Stem
    gForks.append('line')
      .attr('x1', rp.x).attr('y1', boxTopY)
      .attr('x2', rp.x).attr('y2', barLineY)
      .attr('stroke', color).attr('stroke-opacity', 0.2).attr('stroke-width', 1)
      .attr('stroke-dasharray', '3,5')
      .attr('class', 'fork-link fork-stem')
      .attr('data-region', regionName);

    // Horizontal bar
    var minX = Math.min.apply(null, leafXs);
    var maxX = Math.max.apply(null, leafXs);
    if (leafXs.length > 1) {
      gForks.append('line')
        .attr('x1', minX).attr('y1', barLineY)
        .attr('x2', maxX).attr('y2', barLineY)
        .attr('stroke', color).attr('stroke-opacity', 0.25).attr('stroke-width', 1)
        .attr('class', 'fork-link')
        .attr('data-region', regionName);
    }

    // Branches to leaves
    regionLeaves.forEach(function(leaf) {
      gForks.append('line')
        .attr('x1', leaf.pos.x).attr('y1', barLineY)
        .attr('x2', leaf.pos.x).attr('y2', leaf.pos.y + 8)
        .attr('stroke', color).attr('stroke-opacity', 0.25).attr('stroke-width', 1)
        .attr('class', 'fork-link branch-link')
        .attr('data-region', regionName)
        .attr('data-path', leaf.path);

      gForkNodes.append('circle')
        .attr('cx', leaf.pos.x).attr('cy', leaf.pos.y)
        .attr('r', 4)
        .attr('fill', color).attr('fill-opacity', 0.5)
        .attr('stroke', color).attr('stroke-opacity', 0.7).attr('stroke-width', 1)
        .attr('class', 'leaf-node')
        .attr('data-path', leaf.path);

      gForkNodes.append('text')
        .attr('x', leaf.pos.x).attr('y', leaf.pos.y - 10)
        .attr('text-anchor', 'middle')
        .attr('fill', color).attr('fill-opacity', 0.85)
        .attr('font-size', '11px')
        .attr('font-family', "'JetBrains Mono', monospace")
        .text(leaf.path.split('/').pop());
    });
  });

  renderCounters();
}

function renderCounters() {
  gCounters.selectAll('*').remove();
  Object.keys(regionPositions).forEach(function(name) {
    var rp = regionPositions[name];
    var color = REGION_COLORS[name] || '#888';
    var boxW = rp.boxW - 10;
    var badgeX = rp.x + boxW / 2 - 2;
    var badgeY = rp.y - BAR_BOX_H / 2 - 2;
    var count = regionEventCounts[name] || 0;

    var g = gCounters.append('g')
      .attr('class', 'counter-badge')
      .attr('data-region', name);

    g.append('circle')
      .attr('cx', badgeX).attr('cy', badgeY)
      .attr('r', count > 0 ? 12 : 0)
      .attr('fill', color)
      .attr('fill-opacity', 0.2)
      .attr('stroke', color)
      .attr('stroke-opacity', 0.5)
      .attr('stroke-width', 1);

    g.append('text')
      .attr('x', badgeX).attr('y', badgeY + 1)
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .attr('fill', '#fff')
      .attr('fill-opacity', count > 0 ? 0.95 : 0)
      .attr('font-size', '10px')
      .attr('font-family', "'JetBrains Mono', monospace")
      .attr('font-weight', '600')
      .text(count);
  });
}

function updateCounter(regionName) {
  if (!regionName) return;
  regionEventCounts[regionName] = (regionEventCounts[regionName] || 0) + 1;
  var count = regionEventCounts[regionName];
  var badge = gCounters.select('.counter-badge[data-region="' + regionName + '"]');
  if (badge.empty()) return;
  badge.select('circle')
    .transition().duration(200).attr('r', 12).attr('fill-opacity', 0.3);
  badge.select('text')
    .attr('fill-opacity', 0.95).text(count);
  badge.select('circle')
    .transition().duration(150).attr('r', 15).attr('fill-opacity', 0.45)
    .transition().duration(300).attr('r', 12).attr('fill-opacity', 0.2);
}

function regionColorForName(name) {
  return REGION_COLORS[name] || '#888';
}

function getRegionForPath(eventPath) {
  if (!eventPath) return null;
  var p = eventPath.replace(/\\/g, '/').replace(/^.*\.openclaw\/?/, '').replace(/^\//, '');
  var parts = p.split('/');
  for (var i = parts.length; i >= 1; i--) {
    var candidate = parts.slice(0, i).join('/');
    if (treeNodeMap[candidate]) return treeNodeMap[candidate];
  }
  return null;
}

function getRegionAncestorName(treeNode) {
  if (!treeNode) return '';
  if (treeNode.regionName) return treeNode.regionName;
  if (treeNode.depth === 1) return treeNode.data.name;
  return '';
}

// ─── COLUMN STACKING ───
// Array per column. Index 0 = closest to bar (oldest). Last = farthest (newest).
// registerNode is the SOLE authority on Y positions. Nothing else sets them.
var instantMode = false;

var STEP = ACTION_NODE_H + ACTION_NODE_GAP;

function registerNode(key, node, x, baseY) {
  if (!columnStacks[key]) columnStacks[key] = [];
  var col = columnStacks[key];

  // add new node at the end (top of visual stack)
  col.push(node);

  // if over limit, remove the oldest (index 0)
  if (col.length > MAX_VISIBLE_ACTIONS) {
    var dead = col.shift();
    if (dead) {
      if (instantMode) d3.select(dead).remove();
      else d3.select(dead).transition().duration(300).attr('opacity', 0).remove();
    }
  }

  // now position every node. index 0 = bottom (closest to bar), last = top.
  for (var i = 0; i < col.length; i++) {
    var y = baseY - i * STEP;
    if (instantMode) {
      d3.select(col[i]).attr('transform', 'translate(' + x + ',' + y + ')');
    } else {
      d3.select(col[i]).transition().duration(300).ease(d3.easeCubicOut)
        .attr('transform', 'translate(' + x + ',' + y + ')');
    }
  }
}

function getColumnX(treeNode) { return treeNode.px; }

function computeColKey(treeNode, regionName) {
  if (treeNode.depth === 1) return regionName + ':folder';
  var leafPath = '';
  if (treeNode.depth === 2) leafPath = regionName + '/' + treeNode.data.name;
  else leafPath = regionName + ':d3:' + Math.round(treeNode.px);
  return 'leaf:' + (leafPath || regionName);
}

function resetColumnStacks() {
  columnStacks = {};
  belowStacks = { count: 0, nodes: [] };
}


// ─── TIMELINE ───
var TL_PAD = 40;

function getTimelineY() {
  return dims.h * BAR_Y + BAR_BOX_H / 2 + TIMELINE_Y_OFFSET;
}

function calcCanvasWidth() { canvasW = dims.w; }

function renderTimeline() {
  gTimeline.selectAll('*').remove();
  if (events.length === 0) return;

  calcCanvasWidth();

  var y = getTimelineY();
  var x1 = TL_PAD;
  var x2 = canvasW - TL_PAD;

  // Base line — brighter
  gTimeline.append('line')
    .attr('x1', x1).attr('y1', y).attr('x2', x2).attr('y2', y)
    .attr('stroke', '#ffffff').attr('stroke-opacity', 0.08).attr('stroke-width', 1);

  // Glowing line
  gTimeline.append('line')
    .attr('x1', x1).attr('y1', y).attr('x2', x2).attr('y2', y)
    .attr('stroke', 'url(#timeline-gradient)')
    .attr('stroke-width', 2.5).attr('stroke-linecap', 'round')
    .attr('filter', 'url(#glow-timeline)');

  // Core
  gTimeline.append('line')
    .attr('x1', x1).attr('y1', y).attr('x2', x2).attr('y2', y)
    .attr('stroke', '#80bbff').attr('stroke-opacity', 0.4)
    .attr('stroke-width', 1).attr('stroke-linecap', 'round');

  // Time labels — brighter
  var tMin = new Date(events[0].ts).getTime();
  var tMax = new Date(events[events.length - 1].ts).getTime();
  var tSpan = tMax - tMin || 1;
  var labelCount = Math.min(12, events.length);
  var step = Math.max(1, Math.floor(events.length / labelCount));

  for (var i = 0; i < events.length; i += step) {
    var t = new Date(events[i].ts);
    var frac = (t.getTime() - tMin) / tSpan;
    var x = x1 + frac * (x2 - x1);
    var h12 = t.getHours() % 12 || 12;
    var mm = String(t.getMinutes()).padStart(2, '0');
    var ampm = t.getHours() >= 12 ? 'pm' : 'am';

    gTimeline.append('line')
      .attr('x1', x).attr('y1', y - 5).attr('x2', x).attr('y2', y + 5)
      .attr('stroke', '#ffffff').attr('stroke-opacity', 0.15);

    gTimeline.append('text')
      .attr('x', x).attr('y', y + 20)
      .attr('text-anchor', 'middle')
      .attr('fill', '#ffffff').attr('fill-opacity', 0.45)
      .attr('font-size', '10px')
      .attr('font-family', "'JetBrains Mono', monospace")
      .text(h12 + ':' + mm + ampm);
  }

  // Cursor
  gTimeline.append('circle')
    .attr('id', 'timeline-cursor-ring')
    .attr('cx', x1).attr('cy', y).attr('r', 8)
    .attr('fill', 'none').attr('stroke', '#5b9fff')
    .attr('stroke-opacity', 0.3).attr('stroke-width', 1.5)
    .style('animation', 'cursorPulse 2s ease-in-out infinite');

  gTimeline.append('circle')
    .attr('id', 'timeline-cursor')
    .attr('cx', x1).attr('cy', y).attr('r', 5)
    .attr('fill', '#5b9fff').attr('filter', 'url(#glow-strong)').attr('opacity', 1);

  gTimeline.append('circle')
    .attr('id', 'timeline-cursor-center')
    .attr('cx', x1).attr('cy', y).attr('r', 2)
    .attr('fill', '#c0ddff').attr('opacity', 0.95);

  panTransform = d3.zoomIdentity;
  gPannable.attr('transform', panTransform);
}

function getTimelineX(ts) {
  if (events.length === 0) return TL_PAD;
  var x1 = TL_PAD;
  var x2 = canvasW - TL_PAD;
  var tMin = new Date(events[0].ts).getTime();
  var tMax = new Date(events[events.length - 1].ts).getTime();
  var tSpan = tMax - tMin || 1;
  var frac = (new Date(ts).getTime() - tMin) / tSpan;
  return x1 + Math.max(0, Math.min(1, frac)) * (x2 - x1);
}

// ─── ANIMATE EVENT ───
function animateEvent(ev, index, callback) {
  var color = regionColorForPath(ev);
  var tlY = getTimelineY();
  var x = getTimelineX(ev.ts);
  var dur = Math.max(100, 800 / speed);

  d3.select('#timeline-cursor').transition().duration(dur * 0.4).ease(d3.easeCubicOut).attr('cx', x);
  d3.select('#timeline-cursor-ring').transition().duration(dur * 0.4).ease(d3.easeCubicOut).attr('cx', x);
  d3.select('#timeline-cursor-center').transition().duration(dur * 0.4).ease(d3.easeCubicOut).attr('cx', x);

  gTimeline.append('circle')
    .attr('cx', x).attr('cy', tlY).attr('r', 3.5)
    .attr('fill', color).attr('opacity', 0.8);

  var treeNode = ev.path ? getRegionForPath(ev.path) : null;

  var dot = gAnimations.append('circle')
    .attr('cx', x).attr('cy', tlY).attr('r', 3)
    .attr('fill', color)
    .attr('filter', 'url(#glow-' + (getRegionNameForEvent(ev) || 'tools') + ')')
    .attr('opacity', 1);

  // Cross-region flow
  var currentRegion = getRegionNameForEvent(ev);
  if (lastEventRegion && currentRegion && lastEventRegion !== currentRegion) {
    var prevRp = regionPositions[lastEventRegion];
    var curRp = regionPositions[currentRegion];
    if (prevRp && curRp) {
      var boxTopY_ = dims.h * BAR_Y - BAR_BOX_H / 2;
      gFlowLines.append('line')
        .attr('x1', prevRp.x).attr('y1', boxTopY_ - 4)
        .attr('x2', curRp.x).attr('y2', boxTopY_ - 4)
        .attr('stroke', color).attr('stroke-opacity', 0.5)
        .attr('stroke-width', 1.5).attr('stroke-linecap', 'round')
        .transition().duration(1200).ease(d3.easeCubicIn)
        .attr('stroke-opacity', 0).remove();
    }
  }
  lastEventRegion = currentRegion || lastEventRegion;

  // Particles
  for (var pi = 0; pi < 2; pi++) {
    (function(delay) {
      setTimeout(function() {
        var particle = gAnimations.append('circle')
          .attr('cx', x).attr('cy', tlY).attr('r', 1.5)
          .attr('fill', color).attr('opacity', 0.4)
          .attr('filter', 'url(#glow-' + (currentRegion || 'tools') + ')');
        if (treeNode) {
          var rn = getRegionAncestorName(treeNode) || treeNode.data.name;
          var rpP = regionPositions[rn];
          if (rpP) {
            particle.transition().duration(dur * 0.25).ease(d3.easeCubicOut)
              .attr('cx', rpP.x).attr('cy', dims.h * BAR_Y)
              .attr('opacity', 0.2)
              .transition().duration(200).attr('opacity', 0).remove();
          } else {
            particle.transition().duration(300).attr('opacity', 0).remove();
          }
        } else {
          particle.transition().duration(300).attr('opacity', 0).remove();
        }
      }, delay);
    })(40 + pi * 45);
  }

  if (treeNode) {
    var regionName = getRegionAncestorName(treeNode) || treeNode.data.name;
    var rp = regionPositions[regionName];
    if (!rp) { handleNoPath(dot, ev, x, tlY, color, dur, callback); return; }

    var isRegionLevel = treeNode.depth === 1;
    var nodeX = getColumnX(treeNode);
    var boxTopY = dims.h * BAR_Y - BAR_BOX_H / 2;
    var baseY = isRegionLevel ? (boxTopY - ACTION_NODE_H - ACTION_NODE_H / 2) : (treeNode.actionStartY || (treeNode.py - ACTION_START_GAP));
    var colKey = computeColKey(treeNode, regionName);
    // predict where the new node will land (top of stack after insert)
    var col = columnStacks[colKey] || [];
    var topIndex = Math.min(col.length, MAX_VISIBLE_ACTIONS - 1);
    var actionY = baseY - topIndex * STEP;
    var connectorTargetY = isRegionLevel ? boxTopY : (treeNode.py + 8);

    dot.transition().duration(dur * 0.2).ease(d3.easeCubicOut)
      .attr('cx', rp.x).attr('cy', dims.h * BAR_Y)
      .on('end', function() {
        pulseBox(regionName, color);
        updateCounter(regionName);
        lightFork(treeNode, color);
        showActionNode(ev, nodeX, color, dur, colKey, baseY);
        drawConnector(nodeX, actionY + ACTION_NODE_H / 2, nodeX, connectorTargetY, color);

        dot.transition().duration(dur * 0.15).ease(d3.easeCubicOut)
          .attr('cx', nodeX).attr('cy', actionY)
          .attr('r', 2).attr('opacity', 0.6)
          .on('end', function() {
            dot.transition().duration(300).ease(d3.easeCubicIn).attr('opacity', 0).remove();
            if (callback) callback();
          });
      });
  } else {
    handleNoPath(dot, ev, x, tlY, color, dur, callback);
  }
}

function handleNoPath(dot, ev, x, tlY, color, dur, callback) {
  if (belowStacks.nodes.length >= MAX_VISIBLE_ACTIONS) {
    var oldest = belowStacks.nodes.shift();
    if (oldest) d3.select(oldest).transition().duration(300).attr('opacity', 0).remove();
    belowStacks.count = Math.min(belowStacks.count, MAX_VISIBLE_ACTIONS - 1);
    belowStacks.nodes.forEach(function(n, i) {
      var newY = tlY + 30 + i * (ACTION_NODE_H + ACTION_NODE_GAP);
      d3.select(n).transition().duration(300).ease(d3.easeCubicOut)
        .attr('transform', 'translate(' + d3.select(n).attr('data-x') + ',' + newY + ')');
    });
  }
  var belowY = tlY + 30 + belowStacks.count * (ACTION_NODE_H + ACTION_NODE_GAP);
  belowStacks.count++;

  dot.transition().duration(dur * 0.3).ease(d3.easeCubicOut)
    .attr('cy', belowY)
    .on('end', function() {
      showBelowNode(ev, x, belowY, color);
      dot.transition().duration(300).ease(d3.easeCubicIn).attr('opacity', 0).remove();
      if (callback) callback();
    });
}

function regionColorForPath(ev) {
  var rn = getRegionNameForEvent(ev);
  return REGION_COLORS[rn] || '#888';
}

function getRegionNameForEvent(ev) {
  if (ev.region && REGION_COLORS[ev.region]) return ev.region;
  var tn = ev.path ? getRegionForPath(ev.path) : null;
  if (tn) return getRegionAncestorName(tn) || tn.data.name;
  return '';
}

function showActionNode(ev, x, color, dur, colKey, baseY) {
  // Compute where this node will end up (top of stack) so it appears in place
  var col = columnStacks[colKey] || [];
  var targetIndex = Math.min(col.length, MAX_VISIBLE_ACTIONS - 1);
  var targetY = baseY - targetIndex * STEP;

  var g = gActions.append('g')
    .attr('transform', 'translate(' + x + ',' + targetY + ')')
    .attr('opacity', 0);

  registerNode(colKey, g.node(), x, baseY);

  var text = ev.detail || ev.event;
  var maxChars = 30;
  var label = text.length > maxChars ? text.slice(0, maxChars) + '..' : text;
  var width = Math.max(70, label.length * 6.2 + 20);

  g.append('rect')
    .attr('x', -width / 2).attr('y', -ACTION_NODE_H / 2)
    .attr('width', width).attr('height', ACTION_NODE_H)
    .attr('rx', 5).attr('ry', 5)
    .attr('fill', color).attr('fill-opacity', 0.1)
    .attr('stroke', color).attr('stroke-opacity', 0.5).attr('stroke-width', 1);

  g.append('text')
    .attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('fill', color).attr('fill-opacity', 0.95)
    .attr('font-size', '11px')
    .attr('font-family', "'Inter', sans-serif")
    .attr('font-weight', '500')
    .text(label);

  g.transition().duration(250).ease(d3.easeCubicOut).attr('opacity', 1);
}

function showBelowNode(ev, x, y, color) {
  var label = ev.detail || ev.event || 'event';
  var shortLabel = label.length > 24 ? label.slice(0, 24) + '..' : label;
  var width = Math.max(60, shortLabel.length * 5.8 + 14);

  var g = gBelow.append('g')
    .attr('transform', 'translate(' + x + ',' + y + ')')
    .attr('data-x', x)
    .attr('opacity', 0);

  belowStacks.nodes.push(g.node());

  g.append('rect')
    .attr('x', -width / 2).attr('y', -12)
    .attr('width', width).attr('height', 24)
    .attr('rx', 4).attr('ry', 4)
    .attr('fill', color).attr('fill-opacity', 0.08)
    .attr('stroke', color).attr('stroke-opacity', 0.35).attr('stroke-width', 0.8);

  g.append('text')
    .attr('text-anchor', 'middle').attr('dy', '0.35em')
    .attr('fill', color).attr('fill-opacity', 0.85)
    .attr('font-size', '10px')
    .attr('font-family', "'Inter', sans-serif")
    .text(shortLabel);

  gBelow.append('line')
    .attr('x1', x).attr('y1', getTimelineY())
    .attr('x2', x).attr('y2', y)
    .attr('stroke', color).attr('stroke-opacity', 0.2)
    .attr('stroke-width', 1).attr('stroke-dasharray', '3,4');

  g.transition().duration(250).ease(d3.easeCubicOut).attr('opacity', 1);
}

function drawConnector(x1, y1, x2, y2, color) {
  gConnectors.append('line')
    .attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2)
    .attr('stroke', color).attr('stroke-opacity', 0)
    .attr('stroke-width', 1.5).attr('stroke-linecap', 'round')
    .transition().duration(300).ease(d3.easeCubicOut)
    .attr('stroke-opacity', 0.3);
}

function pulseBox(regionName, color) {
  gBar.selectAll('.folder-box')
    .filter(function() { return d3.select(this).attr('data-region') === regionName; })
    .transition().duration(200).ease(d3.easeCubicOut)
    .attr('fill-opacity', 0.25).attr('stroke-opacity', 0.9).attr('stroke-width', 2.5)
    .transition().duration(1200).ease(d3.easeCubicIn)
    .attr('fill-opacity', 0.12).attr('stroke-opacity', 0.5).attr('stroke-width', 1.5);
}

function lightFork(treeNode, color) {
  if (!treeNode || treeNode.depth < 2) return;
  var regionName = getRegionAncestorName(treeNode);
  var path = null;
  if (treeNode.depth === 2) {
    path = regionName + '/' + treeNode.data.name;
  } else if (treeNode.depth >= 3) {
    var keys = Object.keys(leafPositions);
    for (var i = 0; i < keys.length; i++) {
      if (treeNode.px === leafPositions[keys[i]].x && treeNode.py === leafPositions[keys[i]].y) {
        path = keys[i]; break;
      }
    }
  }
  if (!path) return;

  gForks.selectAll('.branch-link')
    .filter(function() { return d3.select(this).attr('data-path') === path; })
    .transition().duration(200).attr('stroke-opacity', 0.7).attr('stroke-width', 2)
    .transition().duration(2000).attr('stroke-opacity', 0.2).attr('stroke-width', 1);

  gForks.selectAll('.fork-link')
    .filter(function() { return d3.select(this).attr('data-region') === regionName && !d3.select(this).classed('branch-link'); })
    .transition().duration(200).attr('stroke-opacity', 0.5)
    .transition().duration(2000).attr('stroke-opacity', 0.2);

  gForkNodes.selectAll('.leaf-node')
    .filter(function() { return d3.select(this).attr('data-path') === path; })
    .transition().duration(200)
    .attr('fill-opacity', 0.85).attr('r', 6).attr('filter', 'url(#glow-pulse)')
    .transition().duration(1200)
    .attr('fill-opacity', 0.5).attr('r', 4).attr('filter', null);
}

// ─── PLAYBACK ───
function startPlayback() {
  if (events.length === 0) return;
  playing = true;
  document.getElementById('btn-play').style.display = 'none';
  document.getElementById('btn-pause').style.display = '';
  playNext();
}

function pausePlayback() {
  playing = false;
  document.getElementById('btn-play').style.display = '';
  document.getElementById('btn-pause').style.display = 'none';
  if (playTimer) { clearTimeout(playTimer); playTimer = null; }
}

function playNext() {
  if (!playing || playIndex >= events.length) { pausePlayback(); return; }
  var ev = events[playIndex];
  playIndex++;
  animateEvent(ev, playIndex - 1, function() {
    if (!playing) return;
    var gap = 300 / speed;
    if (playIndex < events.length) {
      var realGap = new Date(events[playIndex].ts).getTime() - new Date(ev.ts).getTime();
      gap = Math.min(2000, Math.max(100, realGap / 10)) / speed;
    }
    playTimer = setTimeout(playNext, gap);
  });
}

function jumpToEnd() {
  pausePlayback();
  gActions.selectAll('*').remove();
  gConnectors.selectAll('*').remove();
  gBelow.selectAll('*').remove();
  gAnimations.selectAll('*').remove();
  gFlowLines.selectAll('*').remove();

  regionEventCounts = {};
  events.forEach(function(ev) {
    var rn = getRegionNameForEvent(ev);
    if (rn) regionEventCounts[rn] = (regionEventCounts[rn] || 0) + 1;
  });

  renderBar();
  renderTimeline();
  resetColumnStacks();
  instantMode = true;

  var tlY = getTimelineY();

  events.forEach(function(ev) {
    var color = regionColorForPath(ev);
    var x = getTimelineX(ev.ts);

    gTimeline.append('circle')
      .attr('cx', x).attr('cy', tlY).attr('r', 3)
      .attr('fill', color).attr('opacity', 0.7);

    var treeNode = ev.path ? getRegionForPath(ev.path) : null;

    if (treeNode) {
      var regionName = getRegionAncestorName(treeNode) || treeNode.data.name;
      var rp = regionPositions[regionName];
      if (!rp) return;

      var isRegionLevel = treeNode.depth === 1;
      var colKey = computeColKey(treeNode, regionName);
      var nodeX = getColumnX(treeNode);
      var boxTopY = dims.h * BAR_Y - BAR_BOX_H / 2;
      var baseY = isRegionLevel ? (boxTopY - ACTION_NODE_H - ACTION_NODE_H / 2) : (treeNode.actionStartY || (treeNode.py - ACTION_START_GAP));
      var connectorTargetY = isRegionLevel ? boxTopY : (treeNode.py + 8);

      var text = ev.detail || ev.event;
      var label = text.length > 28 ? text.slice(0, 28) + '..' : text;
      var width = Math.max(60, label.length * 6 + 18);

      var g = gActions.append('g').attr('opacity', 0.6);

      // registerNode positions it
      registerNode(colKey, g.node(), nodeX, baseY);

      g.append('rect')
        .attr('x', -width / 2).attr('y', -ACTION_NODE_H / 2)
        .attr('width', width).attr('height', ACTION_NODE_H)
        .attr('rx', 5).attr('ry', 5)
        .attr('fill', color).attr('fill-opacity', 0.08)
        .attr('stroke', color).attr('stroke-opacity', 0.4).attr('stroke-width', 1);

      g.append('text')
        .attr('text-anchor', 'middle').attr('dy', '0.35em')
        .attr('fill', color).attr('fill-opacity', 0.9).attr('font-size', '10px')
        .attr('font-family', "'Inter', sans-serif").attr('font-weight', '500')
        .text(label);

      // connector from node to its parent
      var col = columnStacks[colKey];
      var actionY = baseY - (col.length - 1) * STEP;
      gConnectors.append('line')
        .attr('x1', nodeX).attr('y1', actionY + ACTION_NODE_H / 2)
        .attr('x2', nodeX).attr('y2', connectorTargetY)
        .attr('stroke', color).attr('stroke-opacity', 0.2)
        .attr('stroke-width', 1).attr('stroke-linecap', 'round');

      lightForkStatic(treeNode, color);
    } else {
      var belowY = tlY + 30 + belowStacks.count * (ACTION_NODE_H + ACTION_NODE_GAP);
      belowStacks.count++;

      var bLabel = (ev.detail || ev.event).slice(0, 22);
      var bW = Math.max(50, bLabel.length * 6 + 14);

      var g2 = gBelow.append('g')
        .attr('transform', 'translate(' + x + ',' + belowY + ')')
        .attr('opacity', 0.4);

      g2.append('rect')
        .attr('x', -bW / 2).attr('y', -11)
        .attr('width', bW).attr('height', 22)
        .attr('rx', 4).attr('ry', 4)
        .attr('fill', color).attr('fill-opacity', 0.06)
        .attr('stroke', color).attr('stroke-opacity', 0.3).attr('stroke-width', 0.8);

      g2.append('text')
        .attr('text-anchor', 'middle').attr('dy', '0.35em')
        .attr('fill', color).attr('fill-opacity', 0.75).attr('font-size', '9px')
        .attr('font-family', "'Inter', sans-serif")
        .text(bLabel);

      gBelow.append('line')
        .attr('x1', x).attr('y1', tlY).attr('x2', x).attr('y2', belowY)
        .attr('stroke', color).attr('stroke-opacity', 0.15)
        .attr('stroke-width', 1).attr('stroke-dasharray', '3,4');
    }
  });

  instantMode = false;

  d3.select('#timeline-cursor').attr('cx', canvasW - TL_PAD);
  d3.select('#timeline-cursor-ring').attr('cx', canvasW - TL_PAD);
  d3.select('#timeline-cursor-center').attr('cx', canvasW - TL_PAD);
  playIndex = events.length;
}

function lightForkStatic(treeNode, color) {
  if (!treeNode || treeNode.depth < 2) return;
  var regionName = getRegionAncestorName(treeNode);
  var path = null;
  if (treeNode.depth === 2) {
    path = regionName + '/' + treeNode.data.name;
  } else if (treeNode.depth >= 3) {
    var keys = Object.keys(leafPositions);
    for (var i = 0; i < keys.length; i++) {
      if (treeNode.px === leafPositions[keys[i]].x) { path = keys[i]; break; }
    }
  }
  if (!path) return;

  gForks.selectAll('.branch-link')
    .filter(function() { return d3.select(this).attr('data-path') === path; })
    .attr('stroke-opacity', 0.45).attr('stroke-width', 1.5);

  gForkNodes.selectAll('.leaf-node')
    .filter(function() { return d3.select(this).attr('data-path') === path; })
    .attr('fill-opacity', 0.65).attr('r', 5);
}

// ─── LOAD DATA ───
function loadSession(jsonlText) {
  events = jsonlText.trim().split('\n')
    .filter(function(l) { return l.trim(); })
    .map(function(l) { try { return JSON.parse(l); } catch(e) { return null; } })
    .filter(Boolean)
    .sort(function(a, b) { return new Date(a.ts) - new Date(b.ts); });

  playIndex = 0;
  pausePlayback();
  resetColumnStacks();
  regionEventCounts = {};
  lastEventRegion = '';

  gActions.selectAll('*').remove();
  gConnectors.selectAll('*').remove();
  gBelow.selectAll('*').remove();
  gAnimations.selectAll('*').remove();
  gFlowLines.selectAll('*').remove();

  document.getElementById('controls').style.display = '';
  document.getElementById('empty-state').style.display = 'none';

  renderBar();
  renderTimeline();
  updateStats();
}

function updateStats() {
  document.getElementById('stat-events').textContent = events.length;
  if (events.length > 1) {
    var t0 = new Date(events[0].ts);
    var t1 = new Date(events[events.length - 1].ts);
    var mins = Math.round((t1 - t0) / 60000);
    var h = Math.floor(mins / 60);
    var m = mins % 60;
    document.getElementById('stat-duration').textContent = h > 0 ? h + 'h ' + m + 'm' : m + 'm';
  } else {
    document.getElementById('stat-duration').textContent = '--';
  }
  var regionSet = new Set(events.map(function(e) { return e.region; }).filter(Boolean));
  document.getElementById('stat-regions').textContent = regionSet.size;

  // Event type breakdown
  var typeCounts = {};
  var TYPE_COLORS = { read: '#7ab8ff', write: '#6ee69a', create: '#6ee69a', update: '#ffb85c', delete: '#ff7e7e' };
  events.forEach(function(e) {
    var t = (e.event || 'other').toLowerCase();
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  });
  var sorted = Object.keys(typeCounts).sort(function(a, b) { return typeCounts[b] - typeCounts[a]; });
  var total = events.length || 1;
  var container = document.getElementById('stat-types');
  container.innerHTML = '';
  if (sorted.length === 0) return;

  var bar = document.createElement('div');
  bar.style.cssText = 'display:flex; height:6px; border-radius:3px; overflow:hidden; margin-bottom:6px;';
  sorted.forEach(function(t) {
    var seg = document.createElement('div');
    var c = TYPE_COLORS[t] || '#b8beca';
    seg.style.cssText = 'flex:' + typeCounts[t] + '; background:' + c + '; opacity:0.75;';
    bar.appendChild(seg);
  });
  container.appendChild(bar);

  var labels = document.createElement('div');
  labels.style.cssText = 'display:flex; gap:10px; flex-wrap:wrap;';
  sorted.slice(0, 4).forEach(function(t) {
    var lbl = document.createElement('span');
    var c = TYPE_COLORS[t] || '#b8beca';
    lbl.style.cssText = 'font-size:11px; font-family:"JetBrains Mono",monospace; color:' + c + '; opacity:0.9;';
    lbl.textContent = t + ' ' + typeCounts[t];
    labels.appendChild(lbl);
  });
  container.appendChild(labels);
}

// ─── CYCLE LIST (consolidated) ───
async function fetchCycles() {
  try {
    var res = await fetch('/api/cycles');
    var cycles = await res.json();
    var container = document.getElementById('cycles-list');
    if (cycles.length === 0) {
      container.innerHTML = '<div class="cycles-empty">no cycles found</div>';
      return;
    }
    container.innerHTML = '';

    // Group by date
    var groups = {};
    cycles.forEach(function(c) {
      var key = c.date; // "3/29"
      if (!groups[key]) groups[key] = { dayName: c.dayName, date: c.date, cycles: [] };
      groups[key].cycles.push(c);
    });

    Object.keys(groups).forEach(function(key) {
      var group = groups[key];
      var groupDiv = document.createElement('div');
      groupDiv.className = 'date-group';

      var header = document.createElement('div');
      header.className = 'date-group-header';
      header.textContent = group.dayName + ' ' + group.date;
      groupDiv.appendChild(header);

      group.cycles.forEach(function(c) {
        var item = document.createElement('div');
        item.className = 'cycle-item';
        item.setAttribute('data-cycle-id', c.id);

        var nameDiv = document.createElement('div');
        nameDiv.className = 'cycle-name';
        nameDiv.textContent = c.startTime + '  \u00B7  ' + c.shortDuration;
        item.appendChild(nameDiv);

        var metaDiv = document.createElement('div');
        metaDiv.className = 'cycle-meta';

        var evSpan = document.createElement('span');
        evSpan.className = 'cycle-events';
        evSpan.textContent = c.eventCount + ' events';
        metaDiv.appendChild(evSpan);

        item.appendChild(metaDiv);

        item.addEventListener('click', function() { loadCycle(c.id, item); });
        groupDiv.appendChild(item);
      });

      container.appendChild(groupDiv);
    });
  } catch(e) {
    document.getElementById('cycles-list').innerHTML = '<div class="cycles-empty">server not available</div>';
  }
}

async function loadCycle(cycleId, itemEl) {
  document.querySelectorAll('.cycle-item').forEach(function(el) { el.classList.remove('active'); });
  if (itemEl) itemEl.classList.add('active');
  try {
    currentCycleId = cycleId;
    var res = await fetch('/api/cycle/' + encodeURIComponent(cycleId));
    var text = await res.text();
    loadSession(text);
  } catch(e) {
    console.error('Failed to load cycle:', e);
  }
}

// ─── RESIZE ───
function onResize() {
  var main = document.getElementById('main');
  dims.w = main.clientWidth;
  dims.h = main.clientHeight;
  svg.attr('viewBox', '0 0 ' + dims.w + ' ' + dims.h);

  if (events.length > 0) {
    gActions.selectAll('*').remove();
    gConnectors.selectAll('*').remove();
    gBelow.selectAll('*').remove();
    gAnimations.selectAll('*').remove();
    resetColumnStacks();
    renderBar();
    renderTimeline();
    playIndex = 0;
  } else {
    renderBar();
  }
}

// ─── INIT ───
window.addEventListener('resize', onResize);

document.getElementById('btn-play').addEventListener('click', startPlayback);
document.getElementById('btn-pause').addEventListener('click', pausePlayback);
document.getElementById('btn-jump').addEventListener('click', jumpToEnd);

document.querySelectorAll('.speed-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('.speed-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  });
});

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() { loadSession(reader.result); };
  reader.readAsText(file);
});

var mainEl = document.getElementById('main');
mainEl.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); });
mainEl.addEventListener('drop', function(e) {
  e.preventDefault(); e.stopPropagation();
  var file = e.dataTransfer.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function() { loadSession(reader.result); };
  reader.readAsText(file);
});

onResize();
fetchCycles();
</script>
