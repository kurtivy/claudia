<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:0;background-color:#f4f4f7;font-family:Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;">
<tr><td align="center" style="padding:40px 20px;">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;max-width:600px;">

<!-- Body — intentionally minimal, looks like a real reply -->
<tr><td style="padding:36px 40px 28px 40px;">
  <p style="margin:0 0 18px 0;font-size:16px;line-height:1.6;color:#1a1a2e;">Hi {{first_name}},</p>
  <p style="margin:0 0 18px 0;font-size:16px;line-height:1.6;color:#1a1a2e;">{{body}}</p>
  <p style="margin:0 0 18px 0;font-size:16px;line-height:1.6;color:#1a1a2e;">{{closing}}</p>
</td></tr>

<!-- Signature -->
<tr><td style="padding:0 40px 36px 40px;">
  <table role="presentation" cellpadding="0" cellspacing="0">
  <tr><td style="padding-top:16px;border-top:1px solid #e8e8ed;">
    <p style="margin:0 0 4px 0;font-size:15px;font-weight:bold;color:#1a1a2e;">{{from_name}}</p>
    <p style="margin:0 0 2px 0;font-size:13px;color:#6b7280;">Web3 Advisory</p>
    <p style="margin:0;font-size:13px;color:#6b7280;"><a href="https://web3advisory.co" style="color:#2563eb;text-decoration:none;">web3advisory.co</a></p>
  </td></tr>
  </table>
</td></tr>

<!-- Footer -->
<tr><td style="padding:16px 40px;background-color:#f9fafb;border-top:1px solid #e8e8ed;">
  <p style="margin:0;font-size:11px;line-height:1.8;color:#9ca3af;text-align:center;">
    <a href="{{unsubscribe_project_url}}" style="color:#9ca3af;text-decoration:underline;">Unsubscribe from {{project_name}} emails</a><br>
    <a href="{{unsubscribe_all_url}}" style="color:#bcbcbc;text-decoration:underline;">Unsubscribe from all Web3 Advisory emails</a>
  </p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
